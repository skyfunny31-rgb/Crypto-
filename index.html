<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CryptoMind AI</title>

<style>
body{
  background:#07080f;
  color:white;
  font-family:sans-serif;
  margin:0;
}
#chat{
  height:80vh;
  overflow:auto;
  padding:10px;
}
.msg{
  margin:10px;
  padding:10px;
  border-radius:10px;
}
.user{background:#6c63ff;text-align:right;}
.ai{background:#1a1f35;}
input{
  width:70%;
  padding:10px;
}
button{
  padding:10px;
}
</style>
</head>

<body>

<h2>🤖 CryptoMind AI</h2>

<div id="chat"></div>

<input id="input" placeholder="Ask crypto question..." />
<button onclick="send()">Send</button>

<script>

// error debug
window.onerror = function(msg, url, line) {
  alert("Error: " + msg + " line: " + line);
};

// add message
function add(role,text){
  const div=document.createElement("div");
  div.className="msg "+role;
  div.innerText=text;
  chat.appendChild(div);
  chat.scrollTop=chat.scrollHeight;
}

// chart (simple)
async function showChart(coin){
  const res = await fetch(`https://api.coingecko.com/api/v3/simple/price?ids=${coin}&vs_currencies=usd`);
  const data = await res.json();
  add("ai", "📊 "+coin+" price: $"+data[coin].usd);
}

// send message
async function send(){
  const text=input.value.trim();
  if(!text) return;

  add("user",text);
  input.value="";

  try{
    const res=await fetch('/api/chat',{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({message:text})
    });

    const data=await res.json();
    let reply=data.reply || "No response";

    // detect chart tag
    const match = reply.match(/\[\[CHART:(.+?)\]\]/);

    // remove tag from text
    reply = reply.replace(/\[\[CHART:.+?\]\]/,"");

    add("ai",reply);

    if(match){
      showChart(match[1]);
    }

  }catch(e){
    add("ai","Error: "+e.message);
  }
}

</script>

</body>
</html>
