<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CryptoMind AI</title>

<style>
body{
  background:#07080f;
  color:#e2e4f0;
  font-family:sans-serif;
  margin:0;
  display:flex;
  flex-direction:column;
  height:100vh;
}

.header{
  padding:12px;
  border-bottom:1px solid #1e2240;
  font-weight:bold;
}

#messages{
  flex:1;
  overflow:auto;
  padding:10px;
}

.msg{
  display:flex;
  margin:10px;
}

.user{justify-content:flex-end;}
.ai{justify-content:flex-start;}

.bubble{
  max-width:70%;
  padding:10px;
  border-radius:10px;
}

.user .bubble{
  background:#6c63ff;
  color:white;
}

.ai .bubble{
  background:#131629;
}

.input-area{
  display:flex;
  padding:10px;
  border-top:1px solid #1e2240;
}

input{
  flex:1;
  padding:10px;
  border:none;
  outline:none;
}

button{
  padding:10px;
}
</style>
</head>

<body>

<div class="header">🤖 CryptoMind AI</div>

<div id="messages"></div>

<div class="input-area">
  <input id="input" placeholder="Ask crypto question..." />
  <button onclick="sendMessage()">Send</button>
</div>

<script>

// escape
function escapeHtml(s){
  return s.replace(/&/g,'&amp;')
          .replace(/</g,'&lt;')
          .replace(/>/g,'&gt;');
}

// add message
function addMessage(role,text){
  const div=document.createElement("div");
  div.className="msg "+role;

  text = text.replace(/\[\[CHART:(.+?)\]\]/g,"");

  div.innerHTML=`<div class="bubble">${escapeHtml(text)}</div>`;
  messages.appendChild(div);
  messages.scrollTop=messages.scrollHeight;
}

// chart
async function renderChartCard(coin){
  try{
    const res=await fetch(`https://api.coingecko.com/api/v3/simple/price?ids=${coin}&vs_currencies=usd`);
    const data=await res.json();

    addMessage("ai","📊 "+coin.toUpperCase()+" price: $"+data[coin].usd);
  }catch(e){
    addMessage("ai","Chart error");
  }
}

// send
async function sendMessage(){
  const text=input.value.trim();
  if(!text) return;

  input.value="";
  addMessage("user",text);

  try{
    const res=await fetch('/api/chat',{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({message:text})
    });

    const data=await res.json();
    let reply=data.reply || "No response";

    const charts=[...reply.matchAll(/\[\[CHART:(.+?)\]\]/g)];

    addMessage("ai",reply);

    for(const c of charts){
      await renderChartCard(c[1]);
    }

  }catch(e){
    addMessage("ai","Error: "+e.message);
  }
}

</script>

</body>
</html>
